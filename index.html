<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>the big fat rat</title>
  <link href="" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0b0a;
      background-image: url("https://bigrat.monster/media/bigrat.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #c8d6c8;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      background-image:
        linear-gradient(rgba(0,200,83,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,83,0.04) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
      z-index: 0;
    }

    .window {
      position: relative;
      z-index: 1;
      width: 480px;
      background: #111;
      border: 1px solid #2a2a2a;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
    }

    .titlebar {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 6px 10px;
      font-size: 11px;
      color: #888;
      letter-spacing: 0.05em;
      display: flex;
      justify-content: space-between;
    }

    .titlebar span { color: #00c853; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 1px;
      background: #2a2a2a;
    }

    .panel {
      background: #111;
      padding: 10px 12px;
      min-height: 110px;
    }

    .panel-title {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: #ccc;
      margin-bottom: 8px;
      border-bottom: 1px solid #222;
      padding-bottom: 5px;
      text-transform: none;
    }

    .panel-content {
      font-size: 11px;
      color: #777;
      line-height: 1.7;
    }

    .panel-content .green { color: #00c853; }
    .panel-content .yellow { color: #c8b400; }
    .panel-content .white { color: #ccc; }

    /* Game selection item */
    .game-item {
      color: #00c853;
      font-size: 11px;
      padding: 4px 6px;
      border: 1px solid #1a3a1a;
      background: #0d1a0d;
      cursor: pointer;
      margin-top: 4px;
    }

    /* Options panel buttons */
    .btn {
      display: block;
      width: 100%;
      padding: 7px 0;
      margin-top: 8px;
      background: #1e1e1e;
      border: 1px solid #333;
      color: #ccc;
      font-family: Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 0.06em;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn:hover {
      background: #252525;
      border-color: #00c853;
      color: #00c853;
    }

    .btn:first-of-type { margin-top: 14px; }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <span>bigrat loader v1.0</span>
      <span style="color:#555">[ x ]</span>
    </div>

    <div class="grid">
      <!-- Top Left: Hack Information -->
      <div class="panel">
        <div class="panel-title">Game information</div>
        <div class="panel-content">
          Updated on <span class="white" id="today-date"></span>
          <br><br>
          <strong style="color:#aaa">User information</strong><br>
          Welcome back, <span class="white" id="username">Riley Armstrong Lewis</span><br>
          <span class="green">Sub expires in 9e+26 days</span>
        </div>
      </div>

      <!-- Top Right: Hack Selection -->
      <div class="panel">
        <div class="panel-title">Game selection</div>
        <div class="game-item">eagle minecraft craft</div>
      </div>

      <!-- Bottom Left: Options -->
      <div class="panel">
        <div class="panel-title">Options</div>
        <button class="btn" onclick="window.location.href='EaglercraftX_1.8_u53_Offline_Signed.html'">Load game</button>
        <button class="btn" onclick="window.close()">Exit</button>
      </div>

      <!-- Bottom Right: Status -->
      <div class="panel">
        <div class="panel-title">Status</div>
        <div class="panel-content">
          <span class="white">Connected</span><br>
          <span class="yellow">Your session expires in never because i havent added this yet</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Today's date
    const now = new Date();
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('today-date').textContent =
      months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();

    // Try to get username from URL param e.g. ?user=Logan
    const params = new URLSearchParams(window.location.search);
    const user = params.get('user');
    if (user) document.getElementById('username').textContent = user;
  </script>
</body>
</html>
