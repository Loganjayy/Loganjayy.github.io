<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>The Impossible Quiz</title>
  <script src="https://unpkg.com/@ruffle-rs/ruffle@0.1.0-nightly.2024.1.25"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
    #flash-container { width: 800px; height: 600px; }
  </style>
</head>
<body>
  <div id="flash-container"></div>
  <script>
    window.addEventListener("load", () => {
      const ruffle = window.RufflePlayer.newest();
      const player = ruffle.createPlayer();
      const container = document.getElementById("flash-container");
      container.appendChild(player);
      player.style.width = "800px";
      player.style.height = "600px";
      player.load("impossiblequiz.swf");
    });
  </script>
</body>
</html>
